<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - AJIO Survey</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
    url('ajio-bg.png.png');
    background-size:cover;
    background-position:center;
    padding:20px;
}

.thankyou-card{
    background:white;
    max-width:700px;
    width:100%;
    padding:50px 40px;
    border-radius:24px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{
    width:90px;
    margin-bottom:20px;
}

.success-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#28a745;
    color:white;
    margin:0 auto 25px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    font-weight:bold;
}

h1{
    color:#102A5E;
    margin-bottom:15px;
    font-size:42px;
}

p{
    color:#555;
    line-height:1.8;
    font-size:18px;
}

.footer-text{
    margin-top:30px;
    color:#102A5E;
    font-weight:600;
    font-size:16px;
}
</style>
</head>

<body>

<div class="thankyou-card">

    <img src="ajio-logo.png.png" alt="AJIO Logo" class="logo">

    <div class="success-icon">✓</div>

    <h1>Thank You!</h1>

    <p>
        Your response has been submitted successfully.
        <br><br>
        We sincerely appreciate you taking the time to share your feedback.
        Your valuable suggestions will help us improve and enhance the AJIO shopping experience.
    </p>

    <div class="footer-text">
        ❤️ Thank you for helping us create a better AJIO experience.
    </div>

</div>

</body>
</html>
